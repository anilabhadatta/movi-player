<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movi-Player — live demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    movi-player { width: 100%; height: 100%; display: block; }
  </style>
  <!-- The actual element, loaded from the official moviplayer.com build
       (always latest). No COOP/COEP or isolation headers required. -->
  <script type="module" src="https://moviplayer.com/dist/element.js"></script>
</head>
<body>
  <movi-player
    src="https://moviplayer.com/samples/sintel-2010-1080p.mkv"
    controls
    playsinline
    thumb
    postertime="20%"
  ></movi-player>
</body>
</html>
