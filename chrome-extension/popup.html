<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #08080d;
      --card: #11111a;
      --card-hover: #161622;
      --border: #1a1a26;
      --border-hover: #8B5CF6;
      --text: #fff;
      --muted: #555;
      --accent: #8B5CF6;
      --accent-soft: rgba(139, 92, 246, 0.12);
      --accent-glow: rgba(139, 92, 246, 0.25);
    }
    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    /* ─── Header ─────────────────────── */
    .header {
      padding: 22px 22px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
    }
    .header::after {
      content: "";
      position: absolute;
      left: 22px; right: 22px; bottom: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }
    .header img {
      width: 32px;
      height: 32px;
      border-radius: 9px;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.25);
    }
    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
      line-height: 1;
    }
    .header-text span {
      font-size: 10.5px;
      color: var(--muted);
      margin-top: 3px;
      display: block;
      letter-spacing: 0.2px;
    }

    /* ─── Tile grid ──────────────────── */
    .tiles {
      padding: 18px 18px 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .tile {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 14px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.18s ease;
      position: relative;
      overflow: hidden;
    }
    .tile::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, var(--accent-soft), transparent 70%);
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }
    .tile:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 12px 32px -8px var(--accent-glow);
    }
    .tile:hover::before { opacity: 1; }
    .tile:active { transform: translateY(0); }

    .tile-icon {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent-soft), rgba(139, 92, 246, 0.04));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      transition: all 0.2s;
    }
    .tile:hover .tile-icon {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.25), rgba(139, 92, 246, 0.08));
      transform: scale(1.05);
    }
    .tile-icon svg { width: 22px; height: 22px; }

    .tile-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.1px;
    }
    .tile-sub {
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      line-height: 1.4;
    }
    .tile-sub.error { color: #ef4444; }
    .tile-sub.warn { color: #f59e0b; }

    /* ─── Tip ───────────────────────── */
    .tip {
      margin: 4px 22px 14px;
      padding: 10px 12px;
      background: rgba(139, 92, 246, 0.05);
      border: 1px solid rgba(139, 92, 246, 0.15);
      border-radius: 10px;
      font-size: 10.5px;
      color: #888;
      line-height: 1.5;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .tip svg {
      width: 12px;
      height: 12px;
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 1px;
    }
    .tip b { color: #aaa; font-weight: 600; }

    /* ─── Footer ─────────────────────── */
    .footer {
      padding: 12px 22px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .formats {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex: 1;
    }
    .formats span {
      font-size: 8.5px;
      font-weight: 700;
      color: #2c2c3a;
      letter-spacing: 0.4px;
    }
    .links { display: flex; gap: 12px; }
    .links a {
      color: #2c2c3a;
      text-decoration: none;
      display: flex;
      transition: color 0.15s;
    }
    .links a:hover { color: var(--accent); }
    .links a svg { width: 14px; height: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="">
    <div class="header-text">
      <h1>Movi Player</h1>
      <span>Play any video format</span>
    </div>
  </div>

  <div class="tiles">
    <div class="tile" id="file" title="Open a video file from your device">
      <div class="tile-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 14.9A7 7 0 1 1 15.7 8h1.8a4.5 4.5 0 0 1 2.5 8.2"/>
          <path d="M12 12v9"/>
          <path d="m16 16-4-4-4 4"/>
        </svg>
      </div>
      <div class="tile-label">Open File</div>
      <div class="tile-sub">From your device</div>
    </div>

    <div class="tile" id="paste" title="Play a video link from clipboard">
      <div class="tile-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
      </div>
      <div class="tile-label">Paste Link</div>
      <div class="tile-sub" id="paste-hint">From clipboard</div>
    </div>
  </div>

  <div class="tip">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 16v-4M12 8h.01"/>
    </svg>
    <span>Right-click any video link on the web and choose <b>Open with Movi Player</b></span>
  </div>

  <div class="footer">
    <div class="formats">
      <span>MP4</span><span>MKV</span><span>HEVC</span><span>AV1</span><span>HDR</span><span>4K</span><span>WebM</span>
    </div>
    <div class="links">
      <a href="https://github.com/MrUjjwalG/movi-player" target="_blank" title="GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 00-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.2.5-2.3 1.3-3.1-.2-.4-.6-1.6.1-3.2 0 0 1-.3 3.4 1.2a11.5 11.5 0 016 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.6.3 2.8.2 3.2.7.8 1.2 1.9 1.2 3.1 0 4.6-2.8 5.6-5.5 5.9.5.4.9 1.2.9 2.4v3.5c0 .3.2.7.8.6A12 12 0 0012 .3"/></svg>
      </a>
      <a href="https://www.npmjs.com/package/movi-player" target="_blank" title="npm">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M0 7.334v8h6.666v1.332H12v-1.332h12v-8H0zm6.666 6.664H5.334v-4H3.999v4H1.335V8.667h5.331v5.331zm4 0v1.336H8.001V8.667h5.334v5.331h-2.669zm12.001 0h-1.33v-4h-1.336v4h-1.335v-4h-1.33v4h-2.671V8.667h8.002v5.331z"/></svg>
      </a>
      <a href="https://mrujjwalg.github.io/movi-player/" target="_blank" title="Docs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      </a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
