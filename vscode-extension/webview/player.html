<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="%CSP%">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movi Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    movi-player { width: 100%; height: 100%; display: block; }

    .loading-overlay {
      position: fixed; inset: 0; z-index: 9998; background: #000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; font-family: -apple-system, sans-serif; color: #fff;
    }
    .loading-overlay.hidden { display: none; }
    .loading-spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(139, 92, 246, 0.2);
      border-top-color: #8B5CF6; border-radius: 50%;
      animation: movi-spin 0.8s linear infinite;
    }
    @keyframes movi-spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: #888; }
    .loading-name { font-size: 12px; color: #444; max-width: 80%; text-align: center; word-break: break-all; }
  </style>

  <!-- Spoof crossOriginIsolated=true so MoviElement.checkSecurityHeaders() passes. -->
  <script>
    try {
      Object.defineProperty(window, "crossOriginIsolated", {
        value: true, configurable: true, writable: false,
      });
    } catch (e) { /* noop */ }
  </script>

  <!-- Early-capture: patch console.* + create __movilog (used by bundled
       movi-player code after build-time rewrite). Buffer logs until player.js
       loads and forwards them to the extension's Output channel. -->
  <script>
    (function () {
      var buf = [];
      var forward = null;
      function fmt(a) {
        if (a instanceof Error) return a.stack || (a.name + ": " + a.message);
        if (typeof a === "string") return a;
        try {
          return JSON.stringify(a, function (k, v) {
            if (typeof v === "bigint") return v.toString() + "n";
            if (v instanceof Element) return "<" + v.tagName.toLowerCase() + ">";
            return v;
          });
        } catch { return String(a); }
      }
      function emit(level, args) {
        var text = Array.prototype.map.call(args, fmt).join(" ");
        var entry = { level: level, text: text, t: Date.now() };
        if (forward) forward(entry);
        else buf.push(entry);
      }
      ["log", "info", "warn", "error", "debug"].forEach(function (lvl) {
        console[lvl] = function () { emit(lvl, arguments); };
      });
      window.addEventListener("error", function (e) {
        emit("error", [e.message + " @ " + (e.filename || "?") + ":" + (e.lineno || 0)]);
      });
      window.addEventListener("unhandledrejection", function (e) {
        var r = e.reason;
        emit("error", ["Unhandled rejection: " + (r && (r.stack || r.message) ? (r.stack || r.message) : fmt(r))]);
      });
      function makeLogger(level) { return function () { emit(level, arguments); }; }
      var movilog = makeLogger("log");
      movilog.log = makeLogger("log");
      movilog.info = makeLogger("info");
      movilog.warn = makeLogger("warn");
      movilog.error = makeLogger("error");
      movilog.debug = makeLogger("debug");
      window.__movilog = movilog;
      globalThis.__movilog = movilog;
      window.__moviSetLogForward = function (fn) {
        forward = fn;
        while (buf.length) fn(buf.shift());
      };
    })();
  </script>
</head>
<body>
  <movi-player id="player" %PLAYER_ATTRS%></movi-player>

  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading video</div>
    <div class="loading-name" id="loadingName"></div>
  </div>

  <script src="%ELEMENT_JS%" type="module"></script>
  <script src="%PLAYER_JS%"></script>
</body>
</html>
